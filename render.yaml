services:
  - type: web
    name: texas-cna-academy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >
      streamlit run streamlit_app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
    envVars:
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
    disk:
      name: cna-data
      mountPath: /data
      sizeGB: 1
