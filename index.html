<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas CNA Academy | Pass Your Exam. Track Your CEUs. Advance Your Career.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1f2937; line-height: 1.6; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; }

    /* MODAL OVERLAY */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      z-index: 9999; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #fff; border-radius: 1.5rem; padding: 2.5rem;
      width: 100%; max-width: 440px; position: relative;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: #f3f4f6; border: none; border-radius: 50%;
      width: 32px; height: 32px; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #6b7280; transition: background 0.2s;
    }
    .modal-close:hover { background: #e5e7eb; }

    /* FORM STYLES */
    .form-group { margin-bottom: 1.2rem; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
    .form-input {
      width: 100%; padding: 0.75rem 1rem;
      border: 2px solid #e5e7eb; border-radius: 0.75rem;
      font-size: 0.95rem; font-family: 'Inter', sans-serif;
      color: #1f2937; background: #f9fafb; transition: border 0.2s, background 0.2s;
    }
    .form-input:focus { outline: none; border-color: #1e40af; background: #fff; }
    .form-input::placeholder { color: #9ca3af; }
    .btn-login {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, #1e40af, #1e3a8a);
      color: #fff; border: none; border-radius: 0.75rem;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.02em; transition: opacity 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
    }
    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .divider span { font-size: 0.8rem; color: #9ca3af; white-space: nowrap; }
    .role-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; background: #f3f4f6; padding: 0.3rem; border-radius: 0.75rem; }
    .role-tab {
      flex: 1; padding: 0.5rem 0.25rem; text-align: center;
      border: none; border-radius: 0.5rem; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; background: transparent; color: #6b7280;
      font-family: 'Inter', sans-serif;
    }
    .role-tab.active { background: #1e40af; color: #fff; }
    .forgot-link { font-size: 0.8rem; color: #1e40af; float: right; margin-top: -0.2rem; }
    .forgot-link:hover { text-decoration: underline; }
    .signup-text { text-align: center; font-size: 0.85rem; color: #6b7280; margin-top: 1.2rem; }
    .signup-text a { color: #1e40af; font-weight: 600; }
    .signup-text a:hover { text-decoration: underline; }
    .form-checkbox { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #6b7280; }
    .form-checkbox input { accent-color: #1e40af; }
  </style>
</head>
<body>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="display:inline-flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#1e40af,#1e3a8a);border-radius:8px;display:flex;align-items:center;justify-content:center;">
          <span style="color:#fff;font-weight:900;font-size:0.75rem;">CNA</span>
        </div>
        <span style="font-weight:800;font-size:1.05rem;color:#111827;">Texas CNA Academy</span>
      </div>
      <h2 style="font-size:1.5rem;font-weight:800;color:#111827;margin-bottom:0.25rem;">Welcome Back</h2>
      <p style="color:#6b7280;font-size:0.875rem;">Sign in to continue to your portal</p>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole(this)">Student</button>
      <button class="role-tab" onclick="setRole(this)">Staff</button>
      <button class="role-tab" onclick="setRole(this)">Admin</button>
    </div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password <a href="#" class="forgot-link">Forgot password?</a></label>
        <input class="form-input" type="password" placeholder="Enter your password" required>
      </div>
      <div class="form-group">
        <label class="form-checkbox"><input type="checkbox"> Remember me for 30 days</label>
      </div>
      <button type="submit" class="btn-login">Sign In &rarr;</button>
    </form>
    <div class="signup-text">Don't have an account? <a href="#">Create one free</a></div>
  </div>
</div>
